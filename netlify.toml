[build]
  # Build from the repo root so npm workspaces can resolve @hookcraft/shared
  base = "."
  command = "npm run build --workspace=apps/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"

# Required for Next.js on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Required for Monaco Editor web workers (SharedArrayBuffer)
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
