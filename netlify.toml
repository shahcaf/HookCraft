[build]
  # Build from the repo root so npm workspaces can resolve @hookcraft/shared
  base = "."
  command = "npm run build --workspace=apps/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"

# Required for Next.js on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all unmatched routes to Next.js (handled by plugin, but explicit fallback)
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/___netlify-handler"
  status = 200
