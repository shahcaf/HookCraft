services:
  - type: web
    name: hookcraft
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: cd apps/web && npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: DISCORD_SUPPORT_GUILD_ID
        value: "1459243809224392879"
